<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>회원 가입</title>
    <style>
      #container {
        width:600px;
        margin:10px auto;
      }
    </style>
  </head>
  <body> 
    <div id="container">
      <h1>회원 가입을 환영합니다</h1>
      <form>
        <fieldset>
          <legend>사용자 정보</legend>
          <ul>
            <li><label>아이디<input type="text"></label></li>
            <li><label>이메일<input type="email"></label></li>
            <li><label>비밀번호<input type="password"></label></li>
            <li><label>비밀번호 확인<input type="password"></label></li>
          </ul>
        </fieldset>
        <fieldset>
          <legend>이벤트와 새로운 소식</legend>
          <input type="radio" name="mailing" id="mailing_y">
          <label for="mailing_y">메일 수신</label>    
          <!-- 라디오버튼은 하나의 그룹으로 작동하므로 name속성으로 묶어줘야 함. -->
          <label><input type="radio" name="mailing">메일 수신 안 함</label>
        </fieldset>
        <div> <!--버튼이름은 css로 변경가능-->
          <input type="submit">
          <input type="reset">
        </div>
      </form>
    </div>           
  </body>
</html>
